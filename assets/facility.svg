<svg xmlns="http://www.w3.org/2000/svg" width="920" height="1400" viewBox="0 0 920 1400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d8e0"/>
      <stop offset="100%" style="stop-color:#e8e0d0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8c890"/>
      <stop offset="100%" style="stop-color:#a0b070"/>
    </linearGradient>
  </defs>
  <!-- Background sky / walls -->
  <rect width="920" height="1400" fill="#d0ccc0"/>
  <!-- Roof structure -->
  <rect x="0" y="0" width="920" height="300" fill="url(#sky)" opacity="0.7"/>
  <!-- Metal trusses -->
  <line x1="0" y1="80" x2="920" y2="80" stroke="#888" stroke-width="3"/>
  <line x1="0" y1="150" x2="920" y2="150" stroke="#888" stroke-width="2"/>
  <line x1="100" y1="80" x2="50" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="300" y1="80" x2="250" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="500" y1="80" x2="460" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="700" y1="80" x2="660" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="850" y1="80" x2="820" y2="300" stroke="#999" stroke-width="2"/>
  <!-- Mesh fencing -->
  <rect x="0" y="80" width="920" height="220" fill="none" stroke="#aaa" stroke-width="1" opacity="0.3"/>
  <pattern id="mesh" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="20" y2="20" stroke="#bbb" stroke-width="0.5" opacity="0.6"/>
    <line x1="20" y1="0" x2="0" y2="20" stroke="#bbb" stroke-width="0.5" opacity="0.6"/>
  </pattern>
  <rect x="0" y="80" width="920" height="220" fill="url(#mesh)"/>
  <!-- Court floor -->
  <rect x="0" y="300" width="920" height="700" fill="url(#floor)"/>
  <!-- Court lines -->
  <rect x="100" y="350" width="720" height="580" fill="none" stroke="white" stroke-width="3"/>
  <line x1="460" y1="350" x2="460" y2="930" stroke="white" stroke-width="2"/>
  <line x1="100" y1="580" x2="820" y2="580" stroke="white" stroke-width="2"/>
  <rect x="280" y="580" width="360" height="120" fill="none" stroke="white" stroke-width="2"/>
  <!-- Net -->
  <rect x="100" y="625" width="720" height="5" fill="white" opacity="0.9"/>
  <line x1="460" y1="350" x2="460" y2="630" stroke="white" stroke-width="3"/>
  <!-- Walls / glass panels -->
  <rect x="0" y="300" width="100" height="700" fill="#c0b8a0" opacity="0.8"/>
  <rect x="820" y="300" width="100" height="700" fill="#c0b8a0" opacity="0.8"/>
  <!-- Furniture area (foreground) -->
  <rect x="0" y="1000" width="920" height="400" fill="#b0c870" opacity="0.6"/>
  <!-- Wooden table -->
  <rect x="280" y="1050" width="220" height="140" rx="4" fill="#d4b878" stroke="#b8956a" stroke-width="3"/>
  <rect x="340" y="1190" width="20" height="60" fill="#c4a868"/>
  <rect x="460" y="1190" width="20" height="60" fill="#c4a868"/>
  <!-- Wooden chair -->
  <rect x="560" y="1060" width="160" height="130" rx="4" fill="#d4b878" stroke="#b8956a" stroke-width="3"/>
  <rect x="560" y="1000" width="160" height="65" rx="4" fill="#c8a868" stroke="#b8956a" stroke-width="2"/>
  <rect x="620" y="1190" width="20" height="60" fill="#c4a868"/>
  <rect x="700" y="1190" width="20" height="60" fill="#c4a868"/>
  <!-- Plants -->
  <ellipse cx="150" cy="1080" rx="60" ry="80" fill="#5a9050" opacity="0.8"/>
  <ellipse cx="130" cy="1050" rx="30" ry="50" fill="#4a8040" opacity="0.9"/>
  <ellipse cx="175" cy="1040" rx="25" ry="60" fill="#6aa060" opacity="0.8"/>
  <rect x="135" y="1150" width="30" height="80" rx="2" fill="#6b4423"/>
  <ellipse cx="770" cy="1100" rx="55" ry="70" fill="#5a9050" opacity="0.8"/>
  <rect x="755" y="1160" width="28" height="70" rx="2" fill="#6b4423"/>
  <!-- Fan in background -->
  <circle cx="120" cy="200" r="40" fill="none" stroke="#666" stroke-width="2"/>
  <line x1="120" y1="165" x2="120" y2="195" stroke="#777" stroke-width="3"/>
  <line x1="95" y1="220" x2="115" y2="205" stroke="#777" stroke-width="3"/>
  <line x1="145" y1="220" x2="125" y2="205" stroke="#777" stroke-width="3"/>
  <!-- Light fixture -->
  <rect x="380" y="0" width="160" height="20" fill="#ddd" rx="2"/>
  <rect x="388" y="20" width="144" height="8" fill="#e8e8e8"/>
  <!-- Annotation -->
  <text x="460" y="1350" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="rgba(0,0,0,0.3)" letter-spacing="4">ADD YOUR PHOTO: assets/facility.jpg</text>
</svg>
